<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>飞书通知测试</title>
<style>
body { font-family: sans-serif; padding: 40px; background: #f5f5f5; }
button { padding: 12px 24px; font-size: 16px; cursor: pointer; background: #1a73e8; color: white; border: none; border-radius: 6px; }
pre { background: #1e1e1e; color: #d4d4d4; padding: 16px; border-radius: 6px; margin-top: 16px; white-space: pre-wrap; word-break: break-all; }
</style>
</head>
<body>
<h2>飞书通知测试</h2>
<button onclick="test()">发送测试通知</button>
<pre id="log">点击按钮后这里会显示结果…</pre>
<script>
async function test() {
  const log = document.getElementById('log');
  log.textContent = '发送中…';
  try {
    const r = await fetch('/api/submit', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ type: 'comment', text: '测试飞书通知 ' + new Date().toLocaleTimeString(), visibility: 'private' })
    });
    const data = await r.json();
    log.textContent = 'HTTP 状态: ' + r.status + '\n返回内容: ' + JSON.stringify(data, null, 2);
  } catch(e) {
    log.textContent = '请求失败: ' + e.message;
  }
}
</script>
</body>
</html>
